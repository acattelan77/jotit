<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jot it!</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel__header">
        <div class="panel__title">
          <img class="app-icon" src="icons/icon_48.png" alt="" width="26" height="26" />
          <h1>Jot it!</h1>
        </div>
        <div class="panel__actions">
          <button
            id="clearBtn"
            class="ghost icon-button"
            type="button"
            aria-label="New note"
            title="New note"
            data-label="New"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
          <button
            id="saveBtn"
            class="ghost icon-button"
            type="button"
            aria-label="Save .md"
            title="Save .md"
            data-label="Save"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </button>
          <button
            id="saveAsBtn"
            class="ghost icon-button"
            type="button"
            aria-label="Save as..."
            title="Save as..."
            data-label="Save as"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
          </button>
          <button
            id="libraryToggleBtn"
            class="ghost icon-button"
            type="button"
            aria-label="Note library"
            title="Note library"
            data-label="Library"
            aria-pressed="false"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <rect x="3" y="4" width="18" height="4" rx="1" />
              <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8" />
              <line x1="10" y1="12" x2="14" y2="12" />
            </svg>
          </button>
          <button
            id="attachWindow"
            class="ghost icon-button"
            type="button"
            aria-label="Reattach sidebar"
            title="Reattach sidebar"
            data-label="Reattach"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <rect x="3" y="3" width="14" height="14" rx="2" ry="2" />
              <path d="M10 10l11 11" />
              <path d="M21 15v6h-6" />
            </svg>
          </button>
          <button
            id="openWindow"
            class="ghost icon-button"
            type="button"
            aria-label="Detach sidebar"
            title="Detach sidebar"
            data-label="Detach"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <rect x="3" y="7" width="14" height="14" rx="2" ry="2" />
              <path d="M10 14l11-11" />
              <path d="M15 3h6v6" />
            </svg>
          </button>
        </div>
      </header>

      <div id="onboardingHint" class="onboarding-hint" role="status" hidden>
        <span class="onboarding-hint__text">
          Notes save automatically as you type — <strong>Save</strong>/<strong>Save as</strong>
          are just for exporting to disk. Click <strong>Library</strong> above to find
          everything you've written.
        </span>
        <button
          id="onboardingHintDismiss"
          class="onboarding-hint__dismiss"
          type="button"
          aria-label="Dismiss"
          title="Dismiss"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <section id="metaSection" class="meta">
        <label class="field field--context">
          <div class="field-inline field-inline--text">
            <input
              id="meetingName"
              type="text"
              placeholder="Page title unavailable"
              autocomplete="off"
              aria-label="Context"
            />
            <button
              id="titleLockButton"
              class="inline-icon title-lock"
              type="button"
              aria-label="Lock context title"
              title="Lock context title"
              data-label="Lock"
            >
              <svg
                class="icon icon-lock-closed"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <rect x="5" y="11" width="14" height="10" rx="2" ry="2" />
                <path d="M8 11V8a4 4 0 0 1 8 0v3" />
              </svg>
              <svg
                class="icon icon-lock-open"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <rect x="5" y="11" width="14" height="10" rx="2" ry="2" />
                <path d="M9 11V7a4 4 0 0 1 7 -3" />
              </svg>
            </button>
          </div>
        </label>

        <div class="field-group">
          <label class="field">
            <span class="field__label sr-only">Date & time</span>
            <div class="field-inline">
              <button
                id="meetingDateDisplay"
                class="date-display"
                type="button"
                aria-label="Edit date and time"
              ></button>
              <input id="meetingDate" type="hidden" />
              <div class="date-actions">
                <button
                  id="openDatePicker"
                  class="ghost inline-icon"
                  type="button"
                  title="Open date picker"
                  aria-label="Open date picker"
                >
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                  </svg>
                </button>
                <button
                  id="setNow"
                  class="ghost inline-action"
                  type="button"
                  title="Set to now"
                  aria-label="Set to now"
                >
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <circle cx="12" cy="12" r="9" />
                    <path d="M12 7v5l3 3" />
                  </svg>
                </button>
              </div>
              <div id="datePicker" class="date-picker" role="dialog" aria-hidden="true">
                <div class="date-picker__header">
                  <button type="button" id="datePrev" class="ghost icon-button" aria-label="Previous month">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <path d="M15 18l-6-6 6-6" />
                    </svg>
                  </button>
                  <div id="dateMonth" class="date-picker__month"></div>
                  <button type="button" id="dateNext" class="ghost icon-button" aria-label="Next month">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <path d="M9 6l6 6-6 6" />
                    </svg>
                  </button>
                </div>
                <div class="date-picker__weekdays">
                  <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="dateGrid" class="date-picker__grid" role="grid"></div>
              <div class="date-picker__time">
                <span class="date-picker__label">Time</span>
                <div class="date-picker__steppers" role="group" aria-label="Time">
                  <div class="date-stepper">
                    <button type="button" id="timeHourDec" class="ghost icon-button" aria-label="Decrease hour">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <line x1="5" y1="12" x2="19" y2="12" />
                      </svg>
                    </button>
                    <span id="timeHourValue" class="date-picker__value" aria-live="polite">00</span>
                    <button type="button" id="timeHourInc" class="ghost icon-button" aria-label="Increase hour">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                      </svg>
                    </button>
                  </div>
                  <span class="date-picker__sep">:</span>
                  <div class="date-stepper">
                    <button type="button" id="timeMinuteDec" class="ghost icon-button" aria-label="Decrease minute">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <line x1="5" y1="12" x2="19" y2="12" />
                      </svg>
                    </button>
                    <span id="timeMinuteValue" class="date-picker__value" aria-live="polite">00</span>
                    <button type="button" id="timeMinuteInc" class="ghost icon-button" aria-label="Increase minute">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
                <div class="date-picker__actions">
                  <button type="button" id="dateToday" class="ghost">Today</button>
                  <button type="button" id="dateDone" class="primary">Done</button>
                </div>
              </div>
            </div>
          </label>
        </div>
      </section>

      <section id="notesSection" class="notes">
        <div class="field field--notes">
          <div id="selectionCapture" class="selection-capture" hidden>
            <span id="selectionPreview" class="selection-capture__preview"></span>
            <button id="addSelectionBtn" class="selection-capture__add" type="button">
              Add selection
            </button>
            <button
              id="dismissSelectionBtn"
              class="selection-capture__dismiss"
              type="button"
              aria-label="Dismiss selection"
              title="Dismiss selection"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          <div class="editor-stack">
          <div class="toolbar" role="toolbar" aria-label="Formatting options">
            <button type="button" data-format="bold" title="Bold (Cmd+B)" data-label="Bold (Cmd+B)" aria-label="Bold (Cmd+B)">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M6 4h8a4 4 0 0 1 0 8H6z" />
                <path d="M6 12h9a4 4 0 0 1 0 8H6z" />
              </svg>
            </button>
            <button type="button" data-format="italic" title="Italic (Cmd+I)" data-label="Italic (Cmd+I)" aria-label="Italic (Cmd+I)">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <line x1="19" y1="4" x2="10" y2="4" />
                <line x1="14" y1="20" x2="5" y2="20" />
                <line x1="15" y1="4" x2="9" y2="20" />
              </svg>
            </button>
            <button type="button" data-format="heading" title="Heading" data-label="Heading" aria-label="Heading">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <line x1="6" y1="4" x2="6" y2="20" />
                <line x1="18" y1="4" x2="18" y2="20" />
                <line x1="6" y1="12" x2="18" y2="12" />
              </svg>
            </button>
            <button type="button" data-format="ul" title="Bullet list" data-label="Bullets" aria-label="Bullet list">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <line x1="9" y1="6" x2="21" y2="6" />
                <line x1="9" y1="12" x2="21" y2="12" />
                <line x1="9" y1="18" x2="21" y2="18" />
                <circle cx="4" cy="6" r="1" />
                <circle cx="4" cy="12" r="1" />
                <circle cx="4" cy="18" r="1" />
              </svg>
            </button>
            <button type="button" data-format="ol" title="Numbered list" data-label="Numbered" aria-label="Numbered list">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <line x1="10" y1="6" x2="21" y2="6" />
                <line x1="10" y1="12" x2="21" y2="12" />
                <line x1="10" y1="18" x2="21" y2="18" />
                <path d="M4 6h2v4" />
                <path d="M4 10h2" />
                <path d="M4 14h2" />
              </svg>
            </button>
            <button type="button" data-format="code" title="Inline code" data-label="Code" aria-label="Inline code">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <polyline points="16 18 22 12 16 6" />
                <polyline points="8 6 2 12 8 18" />
              </svg>
            </button>
            <button type="button" data-format="codeblock" title="Code block" data-label="Code block" aria-label="Code block">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <rect x="3" y="4" width="18" height="16" rx="2" />
                <polyline points="9 9 6.5 12 9 15" />
                <polyline points="15 9 17.5 12 15 15" />
              </svg>
            </button>
            <button type="button" data-format="highlight" title="Highlight" data-label="Highlight" aria-label="Highlight">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M14 4l6 6-8.5 8.5H5v-5.5z" />
                <line x1="4" y1="21" x2="9" y2="21" />
              </svg>
            </button>
            <button type="button" data-format="timestamp" title="Insert timestamp" data-label="Time" aria-label="Insert timestamp">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 3" />
              </svg>
            </button>
          </div>
            <div
              id="notes"
              class="editor"
              contenteditable="true"
              data-placeholder="Highlights, decisions, follow-ups..."
              role="textbox"
              aria-multiline="true"
              aria-label="Notes"
              spellcheck="true"
            ></div>
            <div class="editor-stats">
              <span id="wordCount">0 words</span>
              <span class="editor-stats__separator" aria-hidden="true">·</span>
              <span id="characterCount">0 characters</span>
            </div>
          </div>
        </div>
      </section>

      <section id="libraryView" class="library-view" hidden>
        <div class="library-view__toolbar">
          <input
            id="librarySearch"
            type="text"
            class="library-view__search"
            placeholder="Search title, notes, or visited pages..."
            autocomplete="off"
            aria-label="Search saved notes by title, body text, or visited page"
          />
          <button
            id="libraryImportBtn"
            class="ghost icon-button"
            type="button"
            aria-label="Import a note file"
            title="Import a Jot it! .md export"
            data-label="Import"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 8 12 3 17 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </button>
          <input id="libraryImportInput" type="file" accept=".md,text/markdown" hidden />
          <button
            id="libraryExportAllBtn"
            class="ghost icon-button"
            type="button"
            aria-label="Export all notes"
            title="Export all notes"
            data-label="Export all"
          >
            <svg
              class="icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
              <line x1="7" y1="3" x2="17" y2="3" />
            </svg>
          </button>
        </div>
        <div class="library-view__filters">
          <select id="librarySortSelect" class="library-view__sort" aria-label="Sort saved notes">
            <option value="updated">Recently updated</option>
            <option value="created">Recently created</option>
            <option value="title">Title A–Z</option>
          </select>
          <button
            id="libraryFilterSiteBtn"
            class="library-filter-chip"
            type="button"
            aria-pressed="false"
            title="Show only notes with a visited page from the current site"
          >
            This site
          </button>
          <button
            id="libraryMultiSelectBtn"
            class="library-filter-chip"
            type="button"
            aria-pressed="false"
            title="Select multiple notes to delete at once"
          >
            Select
          </button>
        </div>
        <div id="libraryBulkBar" class="library-bulk-bar" hidden>
          <span id="libraryBulkCount" class="library-bulk-bar__count">0 selected</span>
          <div class="library-bulk-bar__actions">
            <button id="libraryBulkDeleteBtn" type="button" class="ghost" disabled>Delete</button>
            <button id="libraryBulkCancelBtn" type="button" class="ghost">Cancel</button>
          </div>
        </div>
        <div id="libraryList" class="library-list"></div>
        <p id="libraryEmptyState" class="library-empty" hidden></p>
      </section>

      <footer class="actions">
        <div id="statusMessage" class="toast" role="status" aria-live="polite"></div>
        <span
          id="versionNumber"
          class="version-number"
          title="What's new in v1.3.0: an automatic note library, search, pin, sort, import, and bulk export"
          >v. 1.3.0</span
        >
      </footer>
    </main>

    <script src="lib/note-utils.js"></script>
    <script src="note-library.js"></script>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
